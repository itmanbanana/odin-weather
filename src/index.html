<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template</title>
  </head>
  <body>
    <header>
      <div class="header-title">Odin Weather</div>
    </header>
    <div class="location-search">
      <form action="" class="form-location-search">
        <div class="form-row">
          <label for="location-search">
            Type the name of any city: 
            <input type="text" id="location-search-input" placeholder="City">
          </label>
        </div>
        <button type="submit" class="location-search-button">Find Locations</button>
      </form>
    </div>
    <div class="location-results">
      <ul class="location-list"></ul>
    </div>
    <div class="weather"></div>
  </body>
</html>
