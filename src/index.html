<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template</title>
  </head>
  <body>
    <header>
      <div class="header-title">Odin Weather</div>
    </header>
    <div class="location-search">
      <form action="" class="form-location-search">
        <div class="form-row">
          <label for="location-search">
            <input type="text" id="location-search-input" placeholder="Type the name of any city...">
          </label>
        </div>
        <button type="submit" class="location-search-button">
          <img src="./images/search.svg" alt="" class="location-search-image">
        </button>
      </form>
    </div>
    <div class="location-results">
      <ul class="location-list"></ul>
    </div>
    <div class="weather"></div>
  </body>
</html>
